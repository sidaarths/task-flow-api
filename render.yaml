services:
  - type: web
    name: task-flow-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false   # set in Render dashboard (secret)
      - key: JWT_SECRET
        sync: false   # set in Render dashboard (secret)
      - key: CLIENT_URL
        sync: false   # set to your Vercel frontend URL
